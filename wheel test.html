<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Bookclub</title>
  <style>
    :root {
      --bg: #020617;
      --glass: rgba(30, 41, 59, 0.7);
      --accent: #38bdf8;
      --neon: #818cf8;
      --success: #2dd4bf;
      --text: #f1f5f9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    
    body {
      background: radial-gradient(circle at top right, #1e1b4b, #020617);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(to bottom right, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    .container {
      display: grid;
      grid-template-columns: 350px 1fr 350px;
      gap: 40px;
      max-width: 1400px;
      width: 100%;
      z-index: 2;
    }

    .panel {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    h2 {
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    textarea {
      width: 100%;
      height: 280px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 15px;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.3s;
    }

    textarea:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 15px;
      text-transform: uppercase;
    }

    .btn-update { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
    .btn-update:hover { background: rgba(255,255,255,0.1); }

    .btn-spin {
      background: linear-gradient(135deg, var(--accent), var(--neon));
      color: #000;
      font-size: 1.1rem;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
    }
    
    .btn-spin:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(56, 189, 248, 0.6); }
    .btn-spin:active { transform: translateY(1px); }

    .wheel-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #canvas {
      max-width: 100%;
      filter: drop-shadow(0 0 50px rgba(0,0,0,0.8));
      transition: transform 0.5s cubic-bezier(0.1, 0, 0, 1);
    }

    .pointer {
      position: absolute;
      top: -10px;
      z-index: 10;
      width: 40px;
      height: 40px;
      background: #fff;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
    }

    .status {
      margin-top: 30px;
      font-size: 1.5rem;
      font-weight: 900;
      text-align: center;
      text-shadow: 0 0 20px var(--accent);
    }

    .book-display {
      text-align: center;
    }

    .book-cover {
      width: 220px;
      height: 330px;
      margin: 0 auto 25px;
      background: #0f172a;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .book-cover img { width: 100%; height: 100%; object-fit: cover; animation: fadeIn 1s; }

    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    #bookTitle { font-size: 1.4rem; font-weight: 800; line-height: 1.2; margin-bottom: 8px; }
    #bookAuthor { color: var(--accent); font-weight: 500; font-size: 1rem; opacity: 0.8; }

    @media (max-width: 1200px) {
      .container { grid-template-columns: 1fr; }
      .panel { max-width: 500px; margin: 0 auto; width: 100%; }
      .wheel-area { order: -1; margin-bottom: 40px; }
    }
  </style>
</head>
<body>

  <h1>Project Bookclub</h1>

  <div class="container">
    <!-- LEFT PANEL: SETTINGS -->
    <div class="panel">
      <h2>Library</h2>
      <textarea id="listInput">Project Hail Mary
The Great Gatsby
Dune
Neuromancer
The Martian
Foundation</textarea>
      <button class="btn btn-update" onclick="wheel.updateItems()">Update Wheel</button>
      <button class="btn btn-spin" id="spinBtn">Press & Hold to Spin</button>
    </div>

    <!-- MIDDLE: THE WHEEL -->
    <div class="wheel-area">
      <div class="pointer"></div>
      <canvas id="canvas" width="600" height="600"></canvas>
      <div id="status" class="status">Waiting for spin...</div>
    </div>

    <!-- RIGHT PANEL: SELECTION -->
    <div class="panel book-display">
      <h2>Winner</h2>
      <div class="book-cover" id="coverDiv">
        <span style="color:rgba(255,255,255,0.2)">Waiting...</span>
      </div>
      <div id="bookTitle">---</div>
      <div id="bookAuthor">---</div>
    </div>
  </div>

  <script>
    const wheel = {
      canvas: document.getElementById('canvas'),
      ctx: document.getElementById('canvas').getContext('2d'),
      status: document.getElementById('status'),
      spinBtn: document.getElementById('spinBtn'),
      input: document.getElementById('listInput'),
      items: [],
      // High-end palette
      colors: ['#0ea5e9', '#6366f1', '#8b5cf6', '#d946ef', '#f43f5e', '#f59e0b', '#10b981', '#06b6d4'],
      angle: 0, velocity: 0, isHolding: false, isSpinning: false, friction: 0.985,

      init() {
        const saved = localStorage.getItem('visualBookList');
        if (saved) this.input.value = saved;
        
        this.spinBtn.addEventListener('pointerdown', () => { if(!this.isSpinning) this.isHolding = true; });
        window.addEventListener('pointerup', () => { 
          if(this.isHolding) { 
            this.isHolding = false; this.isSpinning = true; 
            this.spinBtn.disabled = true; if(this.velocity < 0.1) this.velocity = 0.25; 
          } 
        });
        
        this.updateItems();
        this.loop();
      },

      updateItems() {
        this.items = this.input.value.split('\n').map(item => item.trim()).filter(i => i !== "");
        localStorage.setItem('visualBookList', this.input.value);
        this.draw();
      },

      draw() {
        const centerX = 300, centerY = 300, radius = 280;
        this.ctx.clearRect(0,0,600,600);
        if(!this.items.length) return;
        
        const arc = (Math.PI*2)/this.items.length;
        
        this.items.forEach((text, i) => {
          this.ctx.beginPath();
          this.ctx.fillStyle = this.colors[i % this.colors.length];
          this.ctx.moveTo(centerX, centerY);
          this.ctx.arc(centerX, centerY, radius, this.angle + i*arc, this.angle + (i+1)*arc);
          this.ctx.fill();
          
          // Outer Glow/Border for each slice
          this.ctx.strokeStyle = "rgba(255,255,255,0.1)";
          this.ctx.lineWidth = 2;
          this.ctx.stroke();

          // Text placement
          this.ctx.save();
          this.ctx.translate(centerX, centerY);
          this.ctx.rotate(this.angle + i*arc + arc/2);
          this.ctx.fillStyle = "white";
          this.ctx.font = "900 16px Outfit, sans-serif";
          this.ctx.textAlign = "right";
          this.ctx.shadowBlur = 10;
          this.ctx.shadowColor = "rgba(0,0,0,0.5)";
          this.ctx.fillText(text.toUpperCase().substring(0, 22), radius - 40, 6);
          this.ctx.restore();
        });

        // Center Cap
        this.ctx.beginPath();
        this.ctx.fillStyle = "#020617";
        this.ctx.arc(centerX, centerY, 40, 0, Math.PI*2);
        this.ctx.fill();
        this.ctx.strokeStyle = varProp('--accent');
        this.ctx.lineWidth = 4;
        this.ctx.stroke();
      },

      loop() {
        if(this.isHolding) { 
          this.velocity = Math.min(this.velocity + 0.006, 0.35); 
          this.angle += this.velocity; 
          this.draw(); 
        } else if(this.isSpinning) { 
          this.velocity *= this.friction; 
          this.angle += this.velocity; 
          this.draw();
          if(this.velocity < 0.001) { 
            this.velocity = 0; 
            this.isSpinning = false; 
            this.spinBtn.disabled = false; 
            this.calculateWinner(); 
          }
        }
        requestAnimationFrame(() => this.loop());
      },

      calculateWinner() {
        const arc = (Math.PI*2)/this.items.length;
        let norm = (1.5 * Math.PI - this.angle) % (Math.PI*2);
        if(norm < 0) norm += (Math.PI*2);
        const winner = this.items[Math.floor(norm/arc)];
        this.status.innerHTML = `Winner: <span style="color:var(--accent)">${winner}</span>`;
        this.fetchMetadata(winner);
      },

      async fetchMetadata(title) {
        document.getElementById('bookTitle').textContent = "Scanning...";
        document.getElementById('coverDiv').innerHTML = '<div class="loader-pulse"></div>';
        
        try {
          // Dual API fallback logic for maximum cover reliability
          let res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=intitle:${encodeURIComponent(title)}&maxResults=1`);
          let data = await res.json();
          
          if(data.items && data.items[0].volumeInfo) {
            const info = data.items[0].volumeInfo;
            const img = info.imageLinks ? (info.imageLinks.thumbnail || info.imageLinks.smallThumbnail) : null;
            if(img) {
              this.renderUI(info.title, info.authors, img.replace('http:', 'https:'));
              return;
            }
          }

          // OpenLibrary Fallback
          const olRes = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&limit=1`);
          const olData = await olRes.json();
          if(olData.docs && olData.docs[0]) {
            const doc = olData.docs[0];
            const coverUrl = doc.cover_i ? `https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg` : null;
            this.renderUI(doc.title, doc.author_name, coverUrl);
          } else {
            this.renderUI(title, ["Uncharted"], null);
          }
        } catch(e) { this.renderUI(title, ["Unknown"], null); }
      },

      renderUI(t, a, c) {
        document.getElementById('bookTitle').textContent = t;
        document.getElementById('bookAuthor').textContent = Array.isArray(a) ? a.join(', ') : (a || "Anonymous");
        const coverDiv = document.getElementById('coverDiv');
        coverDiv.innerHTML = c ? `<img src="${c}" referrerpolicy="no-referrer">` : `<span style="color:rgba(255,255,255,0.1)">No Cover Art</span>`;
      }
    };

    function varProp(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
    wheel.init();
  </script>
</body>
</html>
