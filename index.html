<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Book Spinner - Physics & Metadata Edition</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #3b82f6;
      --success: #10b981;
      --text: #f8fafc;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    
    body { 
      background-color: var(--bg); 
      color: var(--text); 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      min-height: 100vh; 
      padding: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: 320px 1fr 320px;
      gap: 25px;
      max-width: 1300px;
      width: 100%;
      margin-top: 20px;
    }

    .panel {
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      border: 1px solid var(--border);
    }

    h2 { margin-bottom: 15px; font-size: 1rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }

    textarea {
      width: 100%;
      height: 250px;
      background: #0a0f1d;
      color: #cbd5e1;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      resize: none;
      margin-bottom: 15px;
      font-size: 14px;
      line-height: 1.6;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }

    .btn-update { background: var(--accent); color: white; }
    .btn-spin { 
      background: var(--success); 
      color: white; 
      font-size: 1.2rem; 
      height: 70px;
      user-select: none;
      touch-action: none;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }

    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

    .wheel-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #canvas {
      max-width: 100%;
      filter: drop-shadow(0 0 30px rgba(0,0,0,0.6));
    }

    .pointer {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 40px solid #ef4444;
      z-index: 10;
    }

    .status {
      margin-top: 25px;
      font-size: 1.3rem;
      font-weight: 800;
      text-align: center;
      min-height: 1.5em;
    }

    .book-cover {
      width: 100%;
      aspect-ratio: 2/3;
      background: #0a0f1d;
      border-radius: 12px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid #334155;
    }

    .book-cover img { width: 100%; height: 100%; object-fit: cover; }
    #bookTitle { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; line-height: 1.3; }
    #bookAuthor { color: #94a3b8; font-size: 0.95rem; }

    @media (max-width: 1000px) {
      .container { grid-template-columns: 1fr; }
      .wheel-area { order: -1; }
    }
  </style>
</head>
<body>

  <h1 style="letter-spacing: -1px; margin-bottom: 10px;">BOOK ROULETTE PRO</h1>

  <div class="container">
    <!-- LEFT: INPUTS -->
    <div class="panel">
      <h2>Reading List</h2>
      <textarea id="listInput">Project Hail Mary
The Seven Husbands of Evelyn Hugo
Dune
Dark Matter
The Midnight Library
Killers of the Flower Moon</textarea>
      <button class="btn btn-update" onclick="wheel.updateItems()">Sync Library</button>
      <button class="btn btn-spin" id="spinBtn">HOLD TO SPIN</button>
    </div>

    <!-- CENTER: WHEEL -->
    <div class="wheel-area">
      <div class="pointer"></div>
      <canvas id="canvas" width="500" height="500"></canvas>
      <div id="status" class="status">Press & hold to start</div>
    </div>

    <!-- RIGHT: METADATA -->
    <div class="panel">
      <h2>Selection Info</h2>
      <div class="book-cover" id="coverDiv">
        <span style="color: #475569;">No Selection Yet</span>
      </div>
      <div id="bookTitle">Ready for your spin</div>
      <div id="bookAuthor">---</div>
    </div>
  </div>

  <script>
    const wheel = {
      canvas: document.getElementById('canvas'),
      ctx: document.getElementById('canvas').getContext('2d'),
      status: document.getElementById('status'),
      spinBtn: document.getElementById('spinBtn'),
      
      items: [],
      colors: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'],
      
      angle: 0,
      velocity: 0,
      isHolding: false,
      isSpinning: false,
      friction: 0.988, 

      init() {
        this.spinBtn.addEventListener('pointerdown', (e) => this.onPress(e));
        window.addEventListener('pointerup', () => this.onRelease());
        this.updateItems();
        this.loop();
      },

      updateItems() {
        const input = document.getElementById('listInput').value;
        this.items = input.split('\n').map(item => item.trim()).filter(item => item !== "");
        this.draw();
      },

      draw() {
        const { ctx, canvas, items, colors, angle } = this;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2 - 20;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (items.length === 0) return;

        const sliceAngle = (Math.PI * 2) / items.length;

        items.forEach((text, i) => {
          const startAngle = angle + (i * sliceAngle);
          
          ctx.beginPath();
          ctx.fillStyle = colors[i % colors.length];
          ctx.moveTo(centerX, centerY);
          ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
          ctx.fill();
          ctx.strokeStyle = 'rgba(0,0,0,0.1)';
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.save();
          ctx.translate(centerX, centerY);
          ctx.rotate(startAngle + sliceAngle / 2);
          ctx.fillStyle = "white";
          ctx.font = "bold 15px sans-serif";
          ctx.textAlign = "right";
          ctx.fillText(text.length > 20 ? text.substring(0, 17) + "..." : text, radius - 35, 6);
          ctx.restore();
        });

        // Center hub
        ctx.beginPath();
        ctx.arc(centerX, centerY, 18, 0, Math.PI * 2);
        ctx.fillStyle = "#1e293b";
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.stroke();
      },

      onPress(e) {
        if (this.isSpinning || this.items.length === 0) return;
        this.isHolding = true;
        this.status.textContent = "CHARGING SPEED...";
      },

      onRelease() {
        if (!this.isHolding) return;
        this.isHolding = false;
        this.isSpinning = true;
        this.spinBtn.disabled = true;
        this.status.textContent = "SPINNING...";
        if (this.velocity < 0.1) this.velocity = 0.25; 
      },

      loop() {
        if (this.isHolding) {
          this.velocity = Math.min(this.velocity + 0.008, 0.45);
          this.angle += this.velocity;
          this.draw();
        } else if (this.isSpinning) {
          this.velocity *= this.friction;
          this.angle += this.velocity;
          this.draw();
          if (this.velocity < 0.001) {
            this.velocity = 0;
            this.isSpinning = false;
            this.spinBtn.disabled = false;
            this.calculateWinner();
          }
        }
        requestAnimationFrame(() => this.loop());
      },

      calculateWinner() {
        const sliceSize = (Math.PI * 2) / this.items.length;
        let normalizedAngle = (1.5 * Math.PI - this.angle) % (Math.PI * 2);
        if (normalizedAngle < 0) normalizedAngle += (Math.PI * 2);
        
        const index = Math.floor(normalizedAngle / sliceSize);
        const winner = this.items[index];
        
        this.status.innerHTML = `WINNER: <span style="color:var(--success)">${winner}</span>`;
        this.fetchMetadata(winner);
      },

      async fetchMetadata(title) {
        document.getElementById('bookTitle').textContent = "Searching...";
        document.getElementById('bookAuthor').textContent = "---";
        
        // 1. Try Google Books
        try {
          const gUrl = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(title)}&maxResults=1`;
          const gRes = await fetch(gUrl);
          const gData = await gRes.json();
          
          if (gData.items && gData.items.length > 0) {
            const b = gData.items[0].volumeInfo;
            this.renderUI(b.title, b.authors, b.imageLinks?.thumbnail);
            return;
          }
        } catch (e) { console.warn("Google API error, trying fallback..."); }

        // 2. Try Open Library Fallback
        try {
          const olUrl = `https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&limit=1`;
          const olRes = await fetch(olUrl);
          const olData = await olRes.json();
          
          if (olData.docs && olData.docs.length > 0) {
            const b = olData.docs[0];
            const cover = b.cover_i ? `https://covers.openlibrary.org/b/id/${b.cover_i}-L.jpg` : null;
            this.renderUI(b.title, b.author_name, cover);
            return;
          }
        } catch (e) { console.error("Metadata failure:", e); }

        document.getElementById('bookTitle').textContent = title;
        document.getElementById('bookAuthor').textContent = "Details not found";
      },

      renderUI(title, authors, coverUrl) {
        document.getElementById('bookTitle').textContent = title;
        document.getElementById('bookAuthor').textContent = authors ? authors.join(', ') : "Unknown Author";
        
        const coverDiv = document.getElementById('coverDiv');
        if (coverUrl) {
          const secureCover = coverUrl.replace('http:', 'https:');
          coverDiv.innerHTML = `<img src="${secureCover}" alt="Cover">`;
        } else {
          coverDiv.innerHTML = `<span style="color: #475569;">No Image</span>`;
        }
      }
    };

    wheel.init();
  </script>
</body>
</html>
