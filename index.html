<!DOCTYPE html>
<html>
  <head>
    <title>Project Bookclub</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        min-height: 95vh;
        margin: 20px;
        user-select: none;
        background-color: #ffffff;
      }

      .controls-container {
        flex: 1;
        max-width: 400px;
        padding: 20px;
        background: #ffffff;
        border: 2px solid #000000;
        border-radius: 8px;
      }

      .wheel-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .wheel-wrapper {
        position: relative;
        width: 500px;
        height: 500px;
        margin-top: 20px;
      }

      .ticker {
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-top: 30px solid #000000;
        z-index: 10;
      }

      textarea {
        width: 100%;
        margin: 10px 0 20px 0;
        padding: 12px;
        font-size: 16px;
        box-sizing: border-box;
        border: 2px solid #000000;
        border-radius: 4px;
        resize: vertical;
        background-color: #ffffff;
        color: #000000;
      }

      #spinBtn {
        padding: 15px 30px;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        border: 2px solid #000000;
        background-color: #000000;
        color: #ffffff;
        border-radius: 5px;
        transition: transform 0.1s, background-color 0.2s;
        width: 100%;
        margin-bottom: 10px;
      }

      #spinBtn:hover {
        background-color: #333333;
      }

      #spinBtn:active {
        transform: scale(0.98);
      }

      #spinBtn:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .sync-buttons {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 8px;
      }

      .sync-btn {
        padding: 10px 15px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        border: 2px solid #000000;
        border-radius: 5px;
        transition: all 0.2s;
        width: 100%;
        text-align: center;
        background-color: #ffffff;
        color: #000000;
      }

      .sync-btn:hover {
        background-color: #f0f0f0;
        transform: scale(0.98);
      }

      .sync-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #syncStatus {
        font-size: 12px;
        color: #555555;
        margin-top: 5px;
        text-align: center;
        min-height: 20px;
      }

      #wheelCanvas {
        width: 500px;
        height: 500px;
        border-radius: 50%;
      }

      .image-container {
        flex: 1;
        max-width: 350px;
        padding: 20px;
        background: #ffffff;
        border: 2px solid #000000;
        border-radius: 8px;
        text-align: center;
      }

      #bookImage {
        max-width: 300px;
        border: 2px solid #000000;
        border-radius: 4px;
        display: none;
      }

      #imagePlaceholder {
        font-size: 14px;
        color: #555555;
      }

      .stats-container {
        margin-top: 15px;
        padding: 10px;
        background: #f5f5f5;
        border: 1px solid #000000;
        border-radius: 4px;
        font-size: 12px;
        color: #000000;
      }

      #spinCount {
        font-weight: bold;
        color: #000000;
      }

      .current-picks {
        font-size: 11px;
        color: #555555;
        margin-top: 4px;
      }

      .divider {
        border: none;
        border-top: 2px dashed #000000;
        margin: 6px 0;
      }

      h1, h2 {
        color: #000000;
      }

      hr {
        border: 1px solid #000000;
      }

      label {
        color: #000000;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  </head>

  <body>

    <div class="controls-container">
      <h2>PROJECT BOOKCLUB</h2>
      <p style="margin: -5px 0 10px 0; font-size: 14px; color: #555555;">By: Robert Cruz</p>
      <hr>
      
      <label for="bookList"><strong>Book List:</strong></label>
      <textarea id="bookList" rows="10" placeholder="List your books here..."
        oninput="saveBooks(); drawWheel()"></textarea>

      <button id="spinBtn">Spin the Wheel</button>
      
      <!-- Google Sheets sync buttons -->
      <div class="sync-buttons">
        <button id="syncFullBtn" class="sync-btn">Sync Full TBR</button>
        <button id="syncWheelBtn" class="sync-btn">Sync Wheel Picks</button>
      </div>
      <div id="syncStatus">Click to load books from your spreadsheet</div>
      
      <!-- Spin statistics -->
      <div class="stats-container">
        <strong>Stats:</strong><br>
        Total spins: <span id="spinCount">0</span> | 
        Last spun: <span id="lastSpin">Never</span>
        <div class="current-picks">
          Current: <span id="currentSource">Not synced</span>
        </div>
      </div>
    </div>

    <div class="wheel-container">
      <h1 id="result">Spin the Wheel!</h1>
      <div class="wheel-wrapper">
        <div class="ticker"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
      </div>
    </div>

    <div class="image-container">
      <h2>Selected Book Cover</h2>
      <div id="bookImageBox">
        <p id="imagePlaceholder">Spin the wheel to see the book cover here.</p>
        <img id="bookImage" src="" alt="">
      </div>
    </div>

    <script>
      // ===== CONFIGURATION =====
      // REPLACE THIS WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
      const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxwiNSENzLmnUdzijZrzKHFQvyYKiG1r7V8s1A2zLiuk6wdrzSAqlSiSE0WAWJI9V2-cA/exec';
      
      // ===== STATE =====
      let currentRotation = 0;
      let isSpinning = false;
      let isHolding = false;
      let holdStartTime = 0;
      let spinLoopInterval = null;
      let totalSpins = parseInt(localStorage.getItem('totalSpins') || '0');
      let lastSpinBook = localStorage.getItem('lastSpinBook') || 'Never';
      let currentSource = localStorage.getItem('currentSource') || 'Not synced';

      const canvas = document.getElementById("wheelCanvas");
      const spinButton = document.getElementById("spinBtn");
      const syncFullBtn = document.getElementById("syncFullBtn");
      const syncWheelBtn = document.getElementById("syncWheelBtn");
      const syncStatus = document.getElementById("syncStatus");
      const spinCountEl = document.getElementById("spinCount");
      const lastSpinEl = document.getElementById("lastSpin");
      const currentSourceEl = document.getElementById("currentSource");

      // Update stats display
      function updateStats() {
        spinCountEl.textContent = totalSpins;
        lastSpinEl.textContent = lastSpinBook;
        currentSourceEl.textContent = currentSource;
      }
      updateStats();

      // ===== LOCAL STORAGE =====
      function saveBooks() {
        const books = document.getElementById("bookList").value;
        localStorage.setItem("bookListData", books);
      }

      function loadBooks() {
        const saved = localStorage.getItem("bookListData");
        if (saved && saved.trim() !== "") {
          document.getElementById("bookList").value = saved;
        } else {
          document.getElementById("bookList").value =
`The Great Gatsby
To Kill a Mockingbird
1984
Pride and Prejudice
The Catcher in the Rye`;
        }
      }

      function checkForBooks() {
        return document.getElementById("bookList").value
          .split("\n")
          .map(b => b.replace(/^["'\s]+|["'\s]+$/g, '').trim())
          .filter(b => b !== "");
      }

      // ===== DRAW WHEEL =====
      function drawWheel() {
        const books = checkForBooks();
        const ctx = canvas.getContext("2d");
        const totalSlices = books.length;

        ctx.clearRect(0, 0, 500, 500);
        if (totalSlices === 0) {
          ctx.font = 'bold 20px Arial';
          ctx.fillStyle = '#999999';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('Add books or sync', 250, 250);
          return;
        }

        const angleOfSlice = (Math.PI * 2) / totalSlices;
        const radius = 230;

        ctx.beginPath();
        ctx.arc(250, 250, radius, 0, Math.PI * 2);
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#000000";
        ctx.stroke();

        for (let i = 0; i < totalSlices; i++) {
          const startAngle = i * angleOfSlice;

          ctx.beginPath();
          ctx.moveTo(250, 250);
          ctx.lineTo(250 + Math.cos(startAngle) * radius, 250 + Math.sin(startAngle) * radius);
          ctx.lineWidth = 2;
          ctx.strokeStyle = "#000000";
          ctx.stroke();

          ctx.save();
          ctx.translate(250, 250);
          ctx.rotate(startAngle + angleOfSlice / 2);
          ctx.textAlign = "right";
          ctx.textBaseline = "middle";
          ctx.fillStyle = "#000000";

          let fontSize = 18;
          if (totalSlices > 15) fontSize = 14;
          if (totalSlices > 30) fontSize = 12;
          ctx.font = `bold ${fontSize}px Arial`;

          let title = books[i];
          if (title.length > 25) {
            title = title.substring(0, 22) + "...";
          }

          ctx.fillText(title, radius - 20, 0);
          ctx.restore();
        }
      }

      // ===== SPIN LOGIC =====
      spinButton.addEventListener("mousedown", startSpinAction);
      window.addEventListener("mouseup", stopSpinAction);

      spinButton.addEventListener("touchstart", (e) => {
        e.preventDefault();
        startSpinAction();
      });
      window.addEventListener("touchend", stopSpinAction);

      function startSpinAction() {
        const bookArray = checkForBooks();
        if (bookArray.length === 0) {
          document.getElementById("result").innerText = "The list box is empty!";
          return;
        }
        if (isSpinning) return;

        isHolding = true;
        holdStartTime = Date.now();
        document.getElementById("result").innerText = "Charging up spin...";

        canvas.style.transition = "none";

        spinLoopInterval = setInterval(() => {
          currentRotation += 18;
          canvas.style.transform = "rotate(" + (currentRotation % 360) + "deg)";
        }, 16.67);
      }

      function stopSpinAction() {
        if (!isHolding) return;
        isHolding = false;
        isSpinning = true;
        spinButton.disabled = true;
        syncFullBtn.disabled = true;
        syncWheelBtn.disabled = true;

        clearInterval(spinLoopInterval);

        const bookArray = checkForBooks();
        const totalSlices = bookArray.length;
        document.getElementById("result").innerText = "Spinning...";

        canvas.style.transition = "transform 4s cubic-bezier(0.1, 0.8, 0.25, 1)";

        const winnerIndex = Math.floor(Math.random() * totalSlices);
        const sliceDegrees = 360 / totalSlices;

        const currentSliceCenterDegree = (winnerIndex * sliceDegrees) + (sliceDegrees / 2);
        const targetDegreeStop = (270 - currentSliceCenterDegree + 360) % 360;

        const durationHeld = Date.now() - holdStartTime;
        const fullSpins = durationHeld > 400 ? 1440 : 2160;

        const baseNormalizedRotation = currentRotation - (currentRotation % 360);
        currentRotation = baseNormalizedRotation + fullSpins + targetDegreeStop;

        canvas.style.transform = "rotate(" + currentRotation + "deg)";

        setTimeout(() => {
          const selectedBook = bookArray[winnerIndex];
          document.getElementById("result").innerText = selectedBook;

          // Update stats
          totalSpins++;
          lastSpinBook = selectedBook;
          localStorage.setItem('totalSpins', totalSpins.toString());
          localStorage.setItem('lastSpinBook', lastSpinBook);
          updateStats();

          // Load book cover
          loadBookImage(selectedBook);

          confetti({
            particleCount: 150,
            spread: 80,
            origin: { y: 0.6 }
          });

          isSpinning = false;
          spinButton.disabled = false;
          syncFullBtn.disabled = false;
          syncWheelBtn.disabled = false;
        }, 4000);
      }

      // ===== GOOGLE SHEETS INTEGRATION =====

      // Sync Full TBR
      async function syncFullTBR() {
        await syncFromGoogleSheets('full', 'Full TBR');
      }

      // Sync Wheel Picks
      async function syncWheelPicks() {
        await syncFromGoogleSheets('wheel', 'Wheel Picks');
      }

      async function syncFromGoogleSheets(type, sourceName) {
        if (!GOOGLE_SHEETS_URL || GOOGLE_SHEETS_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
          syncStatus.textContent = 'Please set your Google Sheets URL first!';
          syncStatus.style.color = '#000000';
          return;
        }

        syncFullBtn.disabled = true;
        syncWheelBtn.disabled = true;
        syncStatus.textContent = `Loading ${sourceName}...`;
        syncStatus.style.color = '#000000';

        try {
          const url = `${GOOGLE_SHEETS_URL}?action=getBooks&type=${type}`;
          console.log('Fetching:', url);
          
          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          
          const data = await response.json();
          console.log('Data received:', data);
          
          if (data.success && data.books && data.books.length > 0) {
            document.getElementById("bookList").value = data.books.join('\n');
            saveBooks();
            drawWheel();
            
            currentSource = sourceName;
            localStorage.setItem('currentSource', currentSource);
            updateStats();
            
            syncStatus.textContent = `Synced ${data.books.length} books from ${sourceName}!`;
            syncStatus.style.color = '#000000';
          } else {
            syncStatus.textContent = `${data.error || 'No books found!'}`;
            syncStatus.style.color = '#000000';
          }
        } catch (error) {
          console.error('Sync error:', error);
          syncStatus.textContent = `Failed to sync: ${error.message}`;
          syncStatus.style.color = '#000000';
        } finally {
          syncFullBtn.disabled = false;
          syncWheelBtn.disabled = false;
        }
      }

      // Sync button events
      syncFullBtn.addEventListener('click', syncFullTBR);
      syncWheelBtn.addEventListener('click', syncWheelPicks);

      // ===== BOOK COVER LOADER =====
      function loadBookImage(title) {
        const imageElement = document.getElementById("bookImage");
        const placeholder = document.getElementById("imagePlaceholder");
        const query = encodeURIComponent(title);

        placeholder.textContent = "Loading cover...";
        imageElement.style.display = "none";
        imageElement.src = "";
        imageElement.alt = "";

        fetch(`https://www.googleapis.com/books/v1/volumes?q=${query}&maxResults=1`)
          .then(response => response.json())
          .then(data => {
            if (data.items && data.items.length > 0) {
              const volumeInfo = data.items[0].volumeInfo;
              if (volumeInfo.imageLinks) {
                const coverUrl = volumeInfo.imageLinks.extraLarge || 
                                volumeInfo.imageLinks.large || 
                                volumeInfo.imageLinks.medium || 
                                volumeInfo.imageLinks.thumbnail.replace('zoom=1', 'zoom=3');
                
                imageElement.src = coverUrl;
                imageElement.alt = title;
                imageElement.style.display = "block";
                placeholder.textContent = "";
                return;
              }
            }
            fallbackToOpenLibrary(title);
          })
          .catch(() => {
            fallbackToOpenLibrary(title);
          });
      }

      function fallbackToOpenLibrary(title) {
        const imageElement = document.getElementById("bookImage");
        const placeholder = document.getElementById("imagePlaceholder");
        const query = encodeURIComponent(title);

        fetch(`https://openlibrary.org/search.json?title=${query}&limit=5`)
          .then(response => response.json())
          .then(data => {
            if (data.docs && data.docs.length > 0) {
              let bestDoc = data.docs[0];
              for (let doc of data.docs) {
                if (doc.isbn && doc.isbn.length > 0) {
                  bestDoc = doc;
                  break;
                }
              }
              
              if (bestDoc.cover_i) {
                const coverUrl = `https://covers.openlibrary.org/b/id/${bestDoc.cover_i}.jpg`;
                imageElement.src = coverUrl;
                imageElement.alt = title;
                imageElement.style.display = "block";
                placeholder.textContent = "";
              } else {
                placeholder.textContent = "No cover found for this title.";
              }
            } else {
              placeholder.textContent = "No cover found for this title.";
            }
          })
          .catch(() => {
            placeholder.textContent = "Error loading cover.";
          });
      }

      // ===== INIT =====
      loadBooks();
      drawWheel();
    </script>
  </body>
</html>
