<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Spin Wheel – by Robert Cruz</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-light: #1e293b;
      --panel-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body { 
      background: linear-gradient(135deg, var(--bg-dark), var(--bg-light)); 
      color: var(--text-main); 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding: 2rem 1rem; 
    }

    .header { 
      width: 100%; max-width: 1400px; text-align: center; font-size: 2.5rem; font-weight: 800; 
      margin-bottom: 2rem; padding: 1.5rem 0; background: var(--panel-bg); 
      border: 1px solid var(--border-color); border-radius: 16px; backdrop-filter: blur(10px);
    }

    .layout-grid { 
      display: grid; grid-template-columns: 320px 1fr 340px; gap: 2rem; 
      width: 100%; max-width: 1400px; 
    }

    .card { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 1.5rem; border-radius: 16px; }

    textarea { 
      width: 100%; height: 180px; background: var(--bg-dark); border: 1px solid var(--border-color); 
      color: var(--text-main); border-radius: 8px; padding: 0.8rem; resize: none; margin-bottom: 1rem; 
    }

    .btn { 
      width: 100%; border: none; padding: 1rem; border-radius: 8px; 
      font-weight: 700; cursor: pointer; transition: 0.2s; margin-bottom: 0.5rem;
    }
    .btn-update { background: var(--primary); color: white; }
    .btn-spin { background: var(--success); color: white; font-size: 1.2rem; cursor: pointer; user-select: none; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-box { 
      margin-top: 1rem; background: rgba(0,0,0,0.3); border-radius: 8px; 
      height: 60px; display: flex; align-items: center; justify-content: center; border: 1px dashed #444;
    }

    .wheel-container { position: relative; width: 450px; height: 450px; margin: 0 auto; }
    .pointer { 
      position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
      width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; 
      border-top: 40px solid #ef4444; z-index: 10; 
    }

    canvas { width: 100% !important; height: 100% !important; border-radius: 50%; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

    .cover-wrapper { width: 100%; aspect-ratio: 2/3; background: #000; border-radius: 8px; margin-bottom: 1rem; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .cover-wrapper img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

  <header class="header">Spin Wheel – Pro Edition</header>

  <main class="layout-grid">
    <aside class="card">
      <h2>🎡 Control</h2>
      <textarea id="choicesInput">Dune
The Hobbit
Foundation
Neuromancer
Dracula</textarea>
      <button class="btn btn-update" id="btnUpdate">Update Wheel</button>
      <button class="btn btn-spin" id="btnSpin">HOLD TO SPIN</button>
      <div class="status-box" id="statusBox">Ready!</div>
    </aside>

    <section class="wheel-container">
      <div class="pointer"></div>
      <canvas id="wheelCanvas"></canvas>
    </section>

    <aside class="card">
      <h2>📚 Book Info</h2>
      <div class="cover-wrapper" id="bookCover"></div>
      <p id="metaTitle" style="font-weight:bold;"></p>
      <p id="metaAuthor" style="color:var(--text-muted); margin-bottom: 1rem;"></p>
      <div id="metaDescription" style="font-size: 0.85rem; color: #ccc;"></div>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const choicesInput = document.getElementById('choicesInput');
    const btnSpin = document.getElementById('btnSpin');
    const btnUpdate = document.getElementById('btnUpdate');
    const statusBox = document.getElementById('statusBox');

    let items = [];
    let rotation = 0;
    let isHolding = false;
    let isSpinning = false;
    let holdInterval;
    const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899'];

    function init() {
      const size = 450;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      ctx.scale(dpr, dpr);
      updateItems();
    }

    function updateItems() {
      items = choicesInput.value.split('\n').map(s => s.trim()).filter(s => s !== "");
      draw();
    }

    function draw() {
      const center = 225;
      const radius = 215;
      ctx.clearRect(0, 0, 450, 450);
      if (items.length === 0) return;

      const arc = (Math.PI * 2) / items.length;
      items.forEach((item, i) => {
        const angle = i * arc;
        ctx.beginPath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, angle, angle + arc);
        ctx.fill();
        ctx.stroke();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(angle + arc / 2);
        ctx.fillStyle = "white";
        ctx.font = "bold 14px sans-serif";
        ctx.fillText(item.slice(0, 15), radius - 100, 5);
        ctx.restore();
      });
    }

    function startHolding(e) {
      if (isSpinning || items.length === 0) return;
      e.preventDefault();
      isHolding = true;
      statusBox.textContent = "Charging up...";
      canvas.style.transition = "none";
      
      holdInterval = setInterval(() => {
        rotation += 15;
        canvas.style.transform = `rotate(${rotation}deg)`;
      }, 16);
    }

    function stopHolding() {
      if (!isHolding) return;
      isHolding = false;
      clearInterval(holdInterval);
      finishSpin();
    }

    function finishSpin() {
      isSpinning = true;
      btnSpin.disabled = true;
      statusBox.textContent = "Spinning...";

      const extraSpins = 360 * 4;
      const stopIdx = Math.floor(Math.random() * items.length);
      const arcDeg = 360 / items.length;
      const finalAngle = 270 - (stopIdx * arcDeg + arcDeg / 2);
      
      rotation += extraSpins + (finalAngle - (rotation % 360));
      
      canvas.style.transition = "transform 3s cubic-bezier(0.1, 0, 0.2, 1)";
      canvas.style.transform = `rotate(${rotation}deg)`;

      setTimeout(() => {
        isSpinning = false;
        btnSpin.disabled = false;
        statusBox.innerHTML = `Winner: <strong>${items[stopIdx]}</strong>`;
        fetchBook(items[stopIdx]);
      }, 3100);
    }

    async function fetchBook(title) {
      try {
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=intitle:${encodeURIComponent(title)}`);
        const data = await res.json();
        const book = data.items[0].volumeInfo;
        document.getElementById('metaTitle').textContent = book.title;
        document.getElementById('metaAuthor').textContent = book.authors?.join(", ") || "Unknown";
        document.getElementById('metaDescription').textContent = book.description?.slice(0, 200) + "...";
        document.getElementById('bookCover').innerHTML = `<img src="${book.imageLinks?.thumbnail.replace('http','https')}" />`;
      } catch (e) { console.log("Fetch error"); }
    }

    btnUpdate.onclick = updateItems;
    btnSpin.onmousedown = startHolding;
    window.onmouseup = stopHolding;
    btnSpin.ontouchstart = startHolding;
    window.ontouchend = stopHolding;

    init();
  </script>
</body>
</html>
