<script>
  // Get a reference to the <canvas> element where the wheel will be drawn.
  const canvas = document.getElementById('wheel');

  // Get the 2D drawing context from the canvas.
  // This is the object we use to draw shapes, text, arcs, etc.
  const ctx = canvas.getContext('2d');

  // Get the result display <div> where we show the winner text.
  const result = document.getElementById('result');

  // -----------------------------
  // STATE VARIABLES FOR THE WHEEL
  // -----------------------------

  // This array will hold the list of items (choices) that appear on the wheel.
  // Example: ["Pizza", "Burger", "Tacos", ...]
  let items = [];

  // This tracks the total rotation applied to the wheel (in degrees).
  // We keep adding to this so the wheel keeps spinning forward instead of snapping back.
  let currentRotation = 0;

  // A flag to indicate whether the wheel is currently spinning.
  // This prevents starting another spin while one is already in progress.
  let spinning = false;

  // This will store the ID of the interval used during "hold to spin" preview.
  // If it's null, no preview is currently running.
  let holdInterval = null;

  // This tracks the rotation used during the "hold to spin" preview.
  // When you release, this value becomes the starting rotation for the real spin.
  let previewRotation = 0;

  // -----------------------------
  // COLORS FOR WHEEL SLICES
  // -----------------------------

  // An array of colors used to fill each slice of the wheel.
  // We cycle through these colors using modulo (%) so they repeat if there are more items than colors.
  const colors = [
    '#ef4444', // red
    '#f97316', // orange
    '#eab308', // yellow
    '#22c55e', // green
    '#06b6d4', // cyan
    '#3b82f6', // blue
    '#8b5cf6', // purple
    '#ec4899'  // pink
  ];

  // ----------------------------------------
  // SAVE & RESTORE TEXTAREA CONTENT (PERSIST)
  // ----------------------------------------

  // Get the textarea where the user types the choices.
  const choicesBox = document.getElementById("choices");

  // Try to load previously saved choices from localStorage.
  // localStorage stores key-value pairs as strings in the browser.
  const savedChoices = localStorage.getItem("wheelChoices");

  // If we found saved choices, use them to populate the textarea.
  if (savedChoices) {
    choicesBox.value = savedChoices;
  }

  // Whenever the user types in the textarea, this event fires.
  // We save the current value of the textarea into localStorage.
  choicesBox.addEventListener("input", () => {
    // Store the current textarea content under the key "wheelChoices".
    localStorage.setItem("wheelChoices", choicesBox.value);
  });

  // ------------------------------------------------
  // FUNCTION: updateWheel
  // PURPOSE: Read textarea, parse into items[], redraw
  // ------------------------------------------------
  function updateWheel() {
    // Get the raw text from the textarea.
    const text = document.getElementById('choices').value;

    // Convert the text into an array of items:
    // 1. Split by newline to get each line.
    // 2. Trim whitespace from each line.
    // 3. Filter out any empty lines.
    items = text
      .split('\n')              // ["Pizza", "Burger", "  Tacos  ", ...]
      .map(item => item.trim()) // ["Pizza", "Burger", "Tacos", ...]
      .filter(item => item !== ''); // Remove any blank lines.

    // After updating the items array, redraw the wheel with the new data.
    drawWheel();
  }

  // ------------------------------------------------
  // FUNCTION: drawWheel
  // PURPOSE: Draw the wheel slices and labels on canvas
  // ------------------------------------------------
  function drawWheel() {
    // Calculate the center of the canvas.
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    // Radius of the wheel (how big the circle is).
    const radius = 240;

    // Clear the entire canvas before drawing a new wheel.
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // If there are no items, there's nothing to draw.
    if (items.length === 0) return;

    // The total angle of a circle is 2 * PI radians.
    // We divide that by the number of items to get the angle of each slice.
    const sliceAngle = (Math.PI * 2) / items.length;

    // Loop over each item and draw its slice.
    items.forEach((item, index) => {
      // The starting angle of this slice.
      const startAngle = index * sliceAngle;

      // The ending angle of this slice.
      const endAngle = startAngle + sliceAngle;

      // Begin a new path for the slice.
      ctx.beginPath();

      // Move to the center of the circle.
      ctx.moveTo(centerX, centerY);

      // Draw an arc from startAngle to endAngle with the given radius.
      ctx.arc(centerX, centerY, radius, startAngle, endAngle);

      // Close the path back to the center, forming a wedge shape.
      ctx.closePath();

      // Choose a color for this slice.
      // We use modulo so if there are more slices than colors, we loop through colors again.
      ctx.fillStyle = colors[index % colors.length];

      // Fill the slice with the chosen color.
      ctx.fill();

      // Now we draw the text label for this slice.
      // We need to rotate and position the context so the text is aligned with the slice.

      // Save the current drawing state (so we can restore it later).
      ctx.save();

      // Move the origin (0,0) to the center of the wheel.
      ctx.translate(centerX, centerY);

      // Rotate the context so that the text is centered in the slice.
      // We rotate to the middle angle of the slice: startAngle + sliceAngle / 2.
      ctx.rotate(startAngle + sliceAngle / 2);

      // Set text color and style.
      ctx.fillStyle = 'white';
      ctx.font = 'bold 20px Arial';

      // Align text to the right so it "points" inward from the edge.
      ctx.textAlign = 'right';

      // Draw the text slightly inside the edge of the wheel.
      // x = radius - 20 (a bit inside the edge), y = 10 (slightly above the center line).
      ctx.fillText(item, radius - 20, 10);

      // Restore the context to its original state (before translate/rotate).
      ctx.restore();
    });

    // Draw a small circle in the center of the wheel for aesthetics.
    ctx.beginPath();
    ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
    ctx.fillStyle = '#111827';
    ctx.fill();
  }

  // ------------------------------------------------
  // FUNCTION: spinWheel
  // PURPOSE: Animate the wheel to land on a random item
  // ------------------------------------------------
  function spinWheel() {
    // If the wheel is already spinning, or there are no items, do nothing.
    if (spinning || items.length === 0) return;

    // Mark that a spin is in progress.
    spinning = true;

    // Show a temporary message while spinning.
    result.innerHTML = 'Spinning...';

    // Choose a random index from the items array.
    // Math.random() gives a number between 0 and 1.
    // Multiplying by items.length gives a range [0, items.length).
    // Math.floor makes it an integer index.
    const randomIndex = Math.floor(Math.random() * items.length);

    // Each slice covers this many degrees.
    const degreesPerSlice = 360 / items.length;

    // The starting angle (in degrees) of the chosen slice.
    const sliceStart = randomIndex * degreesPerSlice;

    // We add padding so the pointer doesn't land exactly on a slice boundary.
    // This is a percentage of the slice size.
    const slicePadding = degreesPerSlice * 0.15;

    // We pick a random offset within the slice, but not too close to the edges.
    // So we start at slicePadding and end at (degreesPerSlice - slicePadding).
    const randomOffset =
      slicePadding +
      Math.random() * (degreesPerSlice - slicePadding * 2);

    // The final angle (in degrees) where we want the pointer to land within that slice.
    const landingAngle = sliceStart + randomOffset;

    // The pointer is at the top of the wheel, which we treat as 270 degrees.
    // We want the chosen slice's landingAngle to end up at 270 degrees.
    // So we compute the target rotation angle that would put landingAngle at 270.
    const targetAngle = 270 - landingAngle;

    // Normalize the current rotation to a value between 0 and 359.
    // This helps avoid huge numbers and makes the math easier.
    const normalizedRotation = currentRotation % 360;

    // We want the wheel to spin multiple full turns for a satisfying animation.
    // 360 * 6 = 6 full rotations.
    const extraSpins = 360 * 6;

    // The total amount we need to rotate from the current position:
    // extraSpins ensures multiple full spins,
    // plus the difference between targetAngle and where we are now.
    const rotationAmount = extraSpins + (targetAngle - normalizedRotation);

    // Update the global currentRotation by adding the rotationAmount.
    currentRotation += rotationAmount;

    // Apply the rotation to the canvas using CSS transform.
    // The CSS transition on the canvas (in the <style> section) controls the animation speed and easing.
    canvas.style.transform = `rotate(${currentRotation}deg)`;

    // After 5 seconds (the same duration as the CSS transition),
    // we assume the spin has finished and show the winner.
    setTimeout(() => {
      // Show the winning item in the result box.
      result.innerHTML = `🎉 Winner: <strong>${items[randomIndex]}</strong>`;

      // Mark that the wheel is no longer spinning.
      spinning = false;
    }, 5000);
  }

  // ------------------------------------------------
  // HOLD-TO-SPIN LOGIC
  // PURPOSE: Let user hold button to preview rotation, then spin
  // ------------------------------------------------

  // Get the spin button element.
  const spinButton = document.getElementById('spinButton');

  // FUNCTION: startHoldSpin
  // Called when the user presses and holds the button (mousedown or touchstart).
  function startHoldSpin() {
    // If the wheel is already spinning, or a holdInterval already exists, do nothing.
    if (spinning || holdInterval) return;

    // Temporarily disable the CSS transition so the wheel rotates instantly during preview.
    canvas.style.transition = 'none';

    // Start an interval that runs every 16ms (~60 frames per second).
    // This creates a smooth continuous rotation while the button is held.
    holdInterval = setInterval(() => {
      // Increase the preview rotation by 15 degrees each frame.
      previewRotation += 15;

      // Apply the preview rotation to the canvas.
      canvas.style.transform = `rotate(${previewRotation}deg)`;
    }, 16);
  }

  // FUNCTION: releaseSpin
  // Called when the user releases the button (mouseup, mouseleave, or touchend).
  function releaseSpin() {
    // If the wheel is spinning or there is no active holdInterval, do nothing.
    if (spinning || !holdInterval) return;

    // Stop the preview rotation interval.
    clearInterval(holdInterval);
    holdInterval = null;

    // Set the currentRotation to whatever the previewRotation ended at.
    // This means the real spin starts from the previewed angle.
    currentRotation = previewRotation;

    // This line forces a browser reflow.
    // It's a trick to make sure the browser "notices" the change in transition settings.
    void canvas.offsetWidth;

    // Re-enable the CSS transition so the next rotation (the real spin) is animated.
    canvas.style.transition = 'transform 5s cubic-bezier(0.17, 0.67, 0.2, 1)';

    // Use a tiny timeout so the browser applies the transition before we call spinWheel().
    setTimeout(() => {
      spinWheel();
    }, 10);
  }

  // Attach mouse events for desktop:
  // When the mouse button is pressed down on the spin button, start the hold preview.
  spinButton.addEventListener('mousedown', startHoldSpin);

  // When the mouse button is released anywhere in the window, trigger releaseSpin.
  window.addEventListener('mouseup', releaseSpin);

  // If the mouse leaves the button while held, also trigger releaseSpin.
  spinButton.addEventListener('mouseleave', releaseSpin);

  // Attach touch events for mobile:
  // On touchstart, prevent default behavior (like scrolling) and start the hold preview.
  spinButton.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startHoldSpin();
  });

  // On touchend, trigger releaseSpin.
  spinButton.addEventListener('touchend', releaseSpin);

  // ----------------------------------------
  // INITIALIZATION: draw wheel on page load
  // ----------------------------------------

  // Call updateWheel() once when the script loads.
  // This reads the textarea (possibly restored from localStorage),
  // fills the items[] array, and draws the initial wheel.
  updateWheel();
</script>
