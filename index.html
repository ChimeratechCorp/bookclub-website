<!DOCTYPE html>
<html>
  <head>
    <title>Project Bookclub</title>
    <style>
      /* Layout styling to split the screen left and right */
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        min-height: 90vh;
        margin: 20px;
      }

      /* Container for all the text controls on the left */
      .controls-container {
        flex: 1;
        max-width: 400px;
        padding: 20px;
      }

      /* Container for the wheel on the right */
      .wheel-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      textarea {
        width: 100%;
        margin-bottom: 15px;
        padding: 10px;
        font-size: 16px;
      }

      /*button {
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
      }

      button:hover {
        background-color: #45a049;
      }*/

      #wheelCanvas {
        /* This is the magic line that makes it spin smoothly */
        transition: transform 4s ease-out;
        border-radius: 50%; /* Just makes the edges look cleaner */
        margin-top: 20px;
      }
    </style>
  </head>
  <body>

  <!-- LEFT SIDE: Controls and Inputs -->
  <div class="controls-container">
    <h2>PROJECT BOOKCLUB <br>By: Robert Cruz</h2> 
    
    <h3>Add books to the textbox below each on a newline</h3>
    <textarea id="bookList" rows="5" oninput="drawWheel()">Book A
Book B
Book C</textarea>
    <br>
    <button onclick="getWinner(checkForBooks())">Click to Spin!</button>
  </div>

  <!-- RIGHT SIDE: Result and Wheel -->
  <div class="wheel-container">
    <h1 id="result">Spin the Wheel!</h1>
    <canvas id="wheelCanvas" width="700" height="700"></canvas>
  </div>

  <script>
    // This variable stays OUTSIDE the function so it remembers the total rotation
    let currentRotation = 0;
    const canvas = document.getElementById("wheelCanvas");

    function checkForBooks(){
      return document.getElementById("bookList").value.split("\n").filter(b => b.trim() !== "");
    }

    function drawWheel() {
      const books = checkForBooks();
      const circle = canvas.getContext("2d");
      const angleOfSlice = (Math.PI * 2) / books.length;
      circle.clearRect(0, 0, 700, 700);

      for (let i = 0; i < books.length; i++) {
        const startAngle = i * angleOfSlice;
        const endAngle = (i + 1) * angleOfSlice;

        circle.beginPath();
        circle.moveTo(350, 350);
        circle.arc(350, 350, 300, startAngle, endAngle);
        circle.lineTo(350, 350);
        circle.stroke();

        circle.save();
        circle.translate(350, 350);
        circle.rotate(startAngle + angleOfSlice / 2);
        circle.textAlign = "center";
        circle.fillStyle = "black";
        circle.font = "21px Arial";
        circle.fillText(books[i], 100, 5);
        circle.restore();
      }
    }

    function getWinner(bookArray) {
      if (bookArray.length === 0) {
        document.getElementById("result").innerText = "Please add some books!";
        return;
      }

      const spinAmount = 1440 + Math.floor(Math.random() * 360);
      currentRotation += spinAmount;
      canvas.style.transform = "rotate(" + currentRotation + "deg)";
      
      const winnerIndex = Math.floor(Math.random() * bookArray.length);

      document.getElementById("result").innerText = "Spinning...";
      setTimeout(() => {
        document.getElementById("result").innerText = "The winner is: " + bookArray[winnerIndex];
      }, 4000); 
    }

    // Initial draw
    drawWheel();
  </script>
  </body>
</html>
