<!DOCTYPE html>
<html>
<body>

  <h2>PROJECT BOOK CLUB 
  <br>By: Robert Cruz</h2> 
  
  
  <h3>Add books to the textbook below each on a newline</h3>
  <textarea id="bookList" rows="3">Add 
Books 
Here</textarea>
  <br>
  
  <button onclick="pickBook()">Click</button>
  <h1 id="result">---</h1>

  <script>
    
    function pickBook() {
      const text = document.getElementById("bookList").value;
      const books = text.split("\n");
      
      
      /* Math.random(): Generates a floating-point number between 0 (inclusive) and 1 (exclusive). 
      Think of it as a percentage, like 0.65.
      Multiplies that decimal by the number of items in your list. 
      If you have 10 books, the result will be between 0 and 9.999....
      Math.floor(): Chops off the decimals (rounds down to the nearest whole number).
      This ensures you get a valid integer that maps perfectly to array indices (which start at 0).*/
      
      const randomIndex = Math.floor(Math.random() * books.length);
      document.getElementById("result").innerText = books[randomIndex];

    }
    
  </script>

</body>
</html>
