<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin Wheel – by Robert Cruz</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .top-title {
      width: 100%;
      text-align: center;
      font-size: 2.2rem;
      font-weight: bold;
      margin-bottom: 25px;
      padding: 15px 0;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
    }

    .container {
      display: grid;
      grid-template-columns: 320px 1fr 320px;
      gap: 30px;
      width: 100%;
      max-width: 1400px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 24px;
      border-radius: 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 240px;
      background: #111827;
      border: 1px solid #374151;
      color: white;
      border-radius: 12px;
      padding: 12px;
      resize: none;
      font-size: 16px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
      margin-bottom: 12px;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .spin-btn {
      background: #22c55e;
      color: white;
    }

    .update-btn {
      background: #3b82f6;
      color: white;
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      text-align: center;
      font-size: 1.2rem;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wheel-section {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .wheel-wrapper {
      position: relative;
      width: 520px;
      height: 520px;
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: white;
      transition: transform 5s cubic-bezier(0.17, 0.67, 0.2, 1);
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 40px solid #ef4444;
      z-index: 10;
    }

    .metadata-panel {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      width: 320px;
      height: 520px;
      overflow-y: auto;
    }

    .metadata-panel img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .metadata-panel h2 {
      margin-bottom: 15px;
      font-size: 1.5rem;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      .wheel-wrapper {
        width: 350px;
        height: 350px;
      }

      .metadata-panel {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>

<body>

  <div class="top-title">Spin Wheel – by Robert Cruz</div>

  <div class="container">

    <!-- LEFT PANEL -->
    <div class="panel">
      <h1>🎡 Spin Wheel</h1>

      <textarea id="choices">Dune
The Hobbit
Pride and Prejudice
The Great Gatsby
1984
The Catcher in the Rye</textarea>

      <button class="update-btn" onclick="updateWheel()">Update Wheel</button>
      <button class="spin-btn" id="spinButton">Press or Hold To Spin</button>

      <div class="result" id="result">Winner will appear here</div>
    </div>

    <!-- WHEEL -->
    <div class="wheel-section">
      <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
      </div>
    </div>

    <!-- METADATA PANEL -->
    <div class="metadata-panel" id="metadataPanel">
      <h2>📚 Book Details</h2>
      <div id="bookCover"></div>
      <p><strong>Title:</strong> <span id="metaTitle">—</span></p>
      <p><strong>Author:</strong> <span id="metaAuthor">—</span></p>
      <p><strong>Year:</strong> <span id="metaYear">—</span></p>
      <p><strong>Genres:</strong> <span id="metaGenres">—</span></p>
      <p><strong>Rating:</strong> <span id="metaRating">—</span></p>
      <p><strong>ISBN:</strong> <span id="metaISBN">—</span></p>
      <p><strong>Description:</strong></p>
      <p id="metaDescription">—</p>
      <p><a id="metaLink" href="#" target="_blank">More Info</a></p>
    </div>

  </div>

  <script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const result = document.getElementById('result');

    let items = [];
    let currentRotation = 0;
    let spinning = false;
    let holdInterval = null;
    let previewRotation = 0;

    const colors = [
      '#ef4444','#f97316','#eab308','#22c55e',
      '#06b6d4','#3b82f6','#8b5cf6','#ec4899'
    ];

    const choicesBox = document.getElementById("choices");

    const savedChoices = localStorage.getItem("wheelChoices");
    if (savedChoices !== null) {
      choicesBox.value = savedChoices;
    }

    updateWheel();

    choicesBox.addEventListener("input", () => {
      localStorage.setItem("wheelChoices", choicesBox.value);
    });

    function updateWheel() {
      const text = choicesBox.value;

      items = text
        .split('\n')
        .map(item => item.trim())
        .filter(item => item !== '');

      drawWheel();
    }

    function drawWheel() {
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const radius = 240;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (items.length === 0) return;

      const sliceAngle = (Math.PI * 2) / items.length;

      items.forEach((item, index) => {
        const startAngle = index * sliceAngle;
        const endAngle = startAngle + sliceAngle;

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.closePath();

        ctx.fillStyle = colors[index % colors.length];
        ctx.fill();

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(startAngle + sliceAngle / 2);

        ctx.fillStyle = 'white';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'right';
        ctx.fillText(item, radius - 20, 10);

        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
      ctx.fillStyle = '#111827';
      ctx.fill();
    }

    function spinWheel() {
      if (spinning || items.length === 0) return;

      spinning = true;
      result.innerHTML = 'Spinning...';

      const randomIndex = Math.floor(Math.random() * items.length);
      const degreesPerSlice = 360 / items.length;

      const sliceStart = randomIndex * degreesPerSlice;
      const slicePadding = degreesPerSlice * 0.15;

      const randomOffset =
        slicePadding +
        Math.random() * (degreesPerSlice - slicePadding * 2);

      const landingAngle = sliceStart + randomOffset;
      const targetAngle = 270 - landingAngle;

      const normalizedRotation = currentRotation % 360;
      const extraSpins = 360 * 6;

      const rotationAmount = extraSpins + (targetAngle - normalizedRotation);
      currentRotation += rotationAmount;

      canvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        const winner = items[randomIndex];
        result.innerHTML = `🎉 Winner: <strong>${winner}</strong>`;
        fetchBookMetadata(winner);
        spinning = false;
      }, 5000);
    }

    const spinButton = document.getElementById('spinButton');

    function startHoldSpin() {
      if (spinning || holdInterval) return;

      canvas.style.transition = 'none';

      holdInterval = setInterval(() => {
        previewRotation += 15;
        canvas.style.transform = `rotate(${previewRotation}deg)`;
      }, 16);
    }

    function releaseSpin() {
      if (spinning || !holdInterval) return;

      clearInterval(holdInterval);
      holdInterval = null;

      currentRotation = previewRotation;

      void canvas.offsetWidth;

      canvas.style.transition = 'transform 5s cubic-bezier(0.17, 0.67, 0.2, 1)';

      setTimeout(() => {
        spinWheel();
      }, 10);
    }

    spinButton.addEventListener('mousedown', startHoldSpin);
    window.addEventListener('mouseup', releaseSpin);
    spinButton.addEventListener('mouseleave', releaseSpin);

    spinButton.addEventListener('touchstart', (e) => {
      e.preventDefault();
      startHoldSpin();
    });

    spinButton.addEventListener('touchend', releaseSpin);

    /* FULL DESCRIPTION MODE — WORK-LEVEL FETCH */
    async function fetchWorkDescription(workKey) {
      try {
        const url = `https://openlibrary.org${workKey}.json`;
        const response = await fetch(url);
        const data = await response.json();

        if (!data) return "Not available";

        if (typeof data.description === "string") {
          return data.description;
        }

        if (data.description && data.description.value) {
          return data.description.value;
        }

        if (data.first_sentence) {
          return Array.isArray(data.first_sentence)
            ? data.first_sentence[0]
            : data.first_sentence;
        }

        return "Not available";

      } catch (err) {
        console.error("Work description error:", err);
        return "Not available";
      }
    }

    /* MAIN METADATA FETCH */
    async function fetchBookMetadata(title) {
      try {
        const url = `https://openlibrary.org/search.json?title=${encodeURIComponent(title)}`;
        const response = await fetch(url);
        const data = await response.json();

        if (!data.docs || data.docs.length === 0) {
          displayMetadata(null);
          return;
        }

        const book = data.docs[0];
        const workKey = book.key;

        const fullDescription = await fetchWorkDescription(workKey);

        const metadata = {
          title: book.title || "Not available",
          author: book.author_name ? book.author_name.join(", ") : "Not available",
          year: book.first_publish_year || "Not available",
          genres: book.subject ? book.subject.slice(0, 5).join(", ") : "Not available",
          rating: book.ratings_average ? `${book.ratings_average.toFixed(1)} / 5` : "Not available",
          isbn: book.isbn ? book.isbn[0] : "Not available",
          description: fullDescription || "Not available",
          cover: book.cover_i
            ? `https://covers.openlibrary.org/b/id/${book.cover_i}-L.jpg`
            : null,
          link: `https://openlibrary.org${workKey}`
        };

        displayMetadata(metadata);

      } catch (error) {
        console.error("Metadata fetch error:", error);
        displayMetadata(null);
      }
    }

    function displayMetadata(meta) {
      if (!meta) {
        document.getElementById("bookCover").innerHTML = "";
        document.getElementById("metaTitle").textContent = "Not available";
        document.getElementById("metaAuthor").textContent = "Not available";
        document.getElementById("metaYear").textContent = "Not available";
        document.getElementById("metaGenres").textContent = "Not available";
        document.getElementById("metaRating").textContent = "Not available";
        document.getElementById("metaISBN").textContent = "Not available";
        document.getElementById("metaDescription").textContent = "Not available";
        document.getElementById("metaLink").href = "#";
        return;
      }

      document.getElementById("bookCover").innerHTML =
        meta.cover ? `<img src="${meta.cover}" alt="Book Cover">` : "";

      document.getElementById("metaTitle").textContent = meta.title;
      document.getElementById("metaAuthor").textContent = meta.author;
      document.getElementById("metaYear").textContent = meta.year;
      document.getElementById("metaGenres").textContent = meta.genres;
      document.getElementById("metaRating").textContent = meta.rating;
      document.getElementById("metaISBN").textContent = meta.isbn;
      document.getElementById("metaDescription").textContent = meta.description;
      document.getElementById("metaLink").href = meta.link;
    }
  </script>
</body>
</html>
